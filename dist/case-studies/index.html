    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is AI visibility and why does it matter for my trade business?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI visibility refers to how likely your business is to be recommended when potential customers ask AI tools like ChatGPT, Google AI, or Perplexity for local service providers. As more people use AI to find tradespeople, being visible in AI answers is becoming as important as appearing in Google search results."
          }
        },
        {
          "@type": "Question",
          "name": "How does the free AI visibility score work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our free score evaluates your business across 5 critical pillars using our proprietary Entity Confidence Engineering™ framework: Entity Clarity (how clearly AI identifies you), Consensus Alignment (agreement across sources), Answer Readiness (content quality), Risk Reduction (trust signals), and Context Precision (relevance). We use live AI integrations to provide real, actionable insights."
          }
        },
        {
          "@type": "Question",
          "name": "What is Entity Confidence Engineering?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Entity Confidence Engineering™ (ECE) is our proprietary framework for measuring and improving how confidently AI systems can identify and recommend your business. It's based on how Large Language Models (LLMs) assess businesses and includes 5 key pillars that determine whether AI will recommend you to potential customers."
          }
        },
        {
          "@type": "Question",
          "name": "Which AI tools does Whoza.ai optimize for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Rex optimizes your visibility across all major AI search tools including ChatGPT, Google AI (Gemini), Perplexity, Claude, and other emerging AI platforms. Our approach focuses on the underlying principles that all AI systems use to assess businesses, ensuring your visibility across current and future AI tools."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to see results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most members see their AI visibility score double within 90 days. Your first score is ready within 48 hours, and you'll receive weekly tasks from Rex to gradually improve your visibility. The exact timeline depends on your starting point and how consistently you complete the weekly tasks."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need technical knowledge to use Rex?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No technical knowledge is required. Rex provides simple, step-by-step tasks that any tradesperson can complete. Each task takes just a few minutes and includes clear instructions. If you can use email and browse the web, you can use Rex."
          }
        },
        {
          "@type": "Question",
          "name": "Is Whoza.ai GDPR compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Whoza.ai is fully GDPR compliant. We take data privacy seriously and only collect the minimum information needed to provide our service. Your data is never sold to third parties, and you have full control over your information at all times."
          }
        },
        {
          "@type": "Question",
          "name": "Which trades does Whoza.ai support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Whoza.ai supports 50+ trades including plumbers, electricians, builders, carpenters, roofers, painters & decorators, landscapers, HVAC engineers, plasterers, tilers, kitchen fitters, bathroom fitters, handymen, and many more. If you're a local service provider in the UK, Rex can help you."
          }
        }
      ]
    }
