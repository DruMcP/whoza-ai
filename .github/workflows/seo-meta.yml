name: SEO Meta Validation

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 05:00 UTC
  workflow_dispatch:

jobs:
  seo-check:
    runs-on: ubuntu-latest
    name: SEO Meta Tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio

      - name: Validate SEO meta
        id: seo
        run: |
          node -e "
          const cheerio = require('cheerio');
          const fs = require('fs');
          
          // Production URLs only (staging is for dev, not canonical)
          const urls = [
            'https://www.whoza.ai/',
            'https://www.whoza.ai/pricing',
            'https://www.whoza.ai/trade/plumber',
            'https://www.whoza.ai/trade/electrician',
            'https://www.whoza.ai/trade/hvac',
            'https://www.whoza.ai/trade/builder',
            'https://www.whoza.ai/trade/roofer',
            'https://www.whoza.ai/trade/landscaper',
            'https://www.whoza.ai/trade/heating-engineer',
            'https://www.whoza.ai/trade/painter',
            'https://www.whoza.ai/support',
            'https://www.whoza.ai/privacy',
            'https://www.whoza.ai/terms',
          ];
          
          // Utility pages that don't need SEO-optimized titles
          const utilityPages = ['/support', '/privacy', '/terms', '/cookie-policy', '/refund-policy', '/fair-use', '/modern-slavery', '/sla', '/dpa', '/vat-info'];
          
          const issues = [];
          
          async function check() {
            for (const url of urls) {
              try {
                const res = await fetch(url, { headers: { 'User-Agent': 'whoza-seo-agent/1.0' } });
                const html = await res.text();
                const $ = cheerio.load(html);
                
                const title = $('title').text();
                const desc = $('meta[name=\"description\"]').attr('content');
                const ogImage = $('meta[property=\"og:image\"]').attr('content');
                const canonical = $('link[rel=\"canonical\"]').attr('href');
                const isUtility = utilityPages.some(p => url.includes(p));
                
                // Title checks: SEO pages need 30-60 chars, utility pages just need a title
                if (!title) {
                  issues.push({url, type: 'title', issue: 'Missing'});
                } else if (!isUtility && (title.length < 30 || title.length > 60)) {
                  issues.push({url, type: 'title', value: title, issue: 'Length: ' + title.length + ' (expected 30-60)'});
                }
                
                // Description checks: SEO pages need 120-160 chars, utility pages just need a description
                if (!desc) {
                  issues.push({url, type: 'description', issue: 'Missing'});
                } else if (!isUtility && (desc.length < 120 || desc.length > 160)) {
                  issues.push({url, type: 'description', value: desc, issue: 'Length: ' + desc.length + ' (expected 120-160)'});
                }
                
                // OG image required for all pages
                if (!ogImage) {
                  issues.push({url, type: 'og:image', issue: 'Missing'});
                }
                
                // Canonical required for all pages
                if (!canonical) {
                  issues.push({url, type: 'canonical', issue: 'Missing'});
                }
              } catch (e) {
                issues.push({url, type: 'fetch', issue: e.message});
              }
            }
            
            const issuesJson = JSON.stringify(issues);
            fs.appendFileSync(process.env.GITHUB_ENV, 'ISSUES=' + issuesJson + '\n');
            console.log('Found ' + issues.length + ' issue(s)');
            if (issues.length > 0) {
              console.log(JSON.stringify(issues, null, 2));
            }
          }
          
          check().catch(e => {
            console.error(e);
            process.exit(1);
          });
          "

      - name: Create issue if violations found
        if: env.ISSUES != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = JSON.parse(process.env.ISSUES || '[]');
            if (issues.length === 0) return;
            
            const title = `[AUTONOMOUS] SEO Meta Violations — ${new Date().toISOString().split('T')[0]}`;
            const body = `## SEO Meta Validation Report
            
            **Time:** ${new Date().toISOString()}
            
            ### Violations Found
            ${issues.map(i => `- **${i.url}** — ${i.type}: ${i.issue}${i.value ? ' ("' + i.value.substring(0, 50) + '")' : ''}`).join('\n')}
            
            ### Rules
            - Title: 30–60 characters (SEO pages only; utility pages exempt)
            - Description: 120–160 characters (SEO pages only; utility pages exempt)
            - OG image: must be present (all pages)
            - Canonical: must be present (all pages)
            
            ---
            *Auto-generated by whoza.ai monitoring system*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['autonomous', 'seo', 'meta']
            });