name: SEO Meta Validation

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  seo-check:
    runs-on: ubuntu-latest
    name: SEO Meta Tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio

      - name: Validate SEO meta
        id: seo
        run: node .github/scripts/seo-meta-check.js

      - name: Create issue if violations found
        if: env.ISSUES != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = JSON.parse(process.env.ISSUES || '[]');
            if (issues.length === 0) return;

            const title = `[AUTONOMOUS] SEO Meta Violations — ${new Date().toISOString().split('T')[0]}`;
            const body = `## SEO Meta Validation Report

            **Time:** ${new Date().toISOString()}

            ### Violations Found
            ${issues.map(i => `- **${i.url}** — ${i.type}: ${i.issue}${i.value ? ' ("' + i.value.substring(0, 50) + '")' : ''}`).join('\n')}

            ### Rules
            - Title: 30–60 characters (SEO pages only; utility pages exempt)
            - Description: 120–160 characters (SEO pages only; utility pages exempt)
            - OG image: must be present (all pages)
            - Canonical: must be present (all pages)

            ---
            *Auto-generated by whoza.ai monitoring system*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['autonomous', 'seo', 'meta']
            });
