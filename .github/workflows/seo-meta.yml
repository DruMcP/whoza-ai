name: SEO Meta Validation

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 05:00 UTC
  workflow_dispatch:

jobs:
  seo-check:
    runs-on: ubuntu-latest
    name: SEO Meta Tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio node-fetch

      - name: Validate SEO meta
        id: seo
        run: |
          node -e "
          const cheerio = require('cheerio');
          const fetch = require('node-fetch');
          
          const urls = [
            'https://whoza-ai-staging-349.netlify.app/',
            'https://whoza-ai-staging-349.netlify.app/pricing',
            'https://whoza-ai-staging-349.netlify.app/trade/plumber',
            'https://whoza-ai-staging-349.netlify.app/trade/electrician',
            'https://whoza-ai-staging-349.netlify.app/trade/hvac',
            'https://www.whoza.ai/',
            'https://www.whoza.ai/pricing',
            'https://www.whoza.ai/trade/plumber',
            'https://www.whoza.ai/trade/electrician',
            'https://www.whoza.ai/trade/hvac',
          ];
          
          const issues = [];
          
          async function check() {
            for (const url of urls) {
              try {
                const res = await fetch(url, { headers: { 'User-Agent': 'whoza-seo-agent/1.0' } });
                const html = await res.text();
                const $ = cheerio.load(html);
                
                const title = $('title').text();
                const desc = $('meta[name=\"description\"]').attr('content');
                const ogImage = $('meta[property=\"og:image\"]').attr('content');
                const canonical = $('link[rel=\"canonical\"]').attr('href');
                
                if (!title || title.length < 30 || title.length > 60) {
                  issues.push({url, type: 'title', value: title, issue: 'Length: ' + (title?.length || 0)});
                }
                if (!desc || desc.length < 120 || desc.length > 160) {
                  issues.push({url, type: 'description', value: desc, issue: 'Length: ' + (desc?.length || 0)});
                }
                if (!ogImage) {
                  issues.push({url, type: 'og:image', issue: 'Missing'});
                }
                if (!canonical) {
                  issues.push({url, type: 'canonical', issue: 'Missing'});
                }
              } catch (e) {
                issues.push({url, type: 'fetch', issue: e.message});
              }
            }
            
            console.log('ISSUES=' + JSON.stringify(issues));
          }
          
          check();
          "

      - name: Create issue if violations found
        if: env.ISSUES != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = JSON.parse(process.env.ISSUES || '[]');
            if (issues.length === 0) return;
            
            const title = `[AUTONOMOUS] SEO Meta Violations — ${new Date().toISOString().split('T')[0]}`;
            const body = `## SEO Meta Validation Report
            
            **Time:** ${new Date().toISOString()}
            
            ### Violations Found
            ${issues.map(i => `- **${i.url}** — ${i.type}: ${i.issue}${i.value ? ' (\"' + i.value.substring(0, 50) + '\")' : ''}`).join('\\n')}
            
            ### Rules
            - Title: 30–60 characters
            - Description: 120–160 characters
            - OG image: must be present
            - Canonical: must be present
            
            ---
            *Auto-generated by whoza.ai monitoring system*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['autonomous', 'seo', 'meta']
            });