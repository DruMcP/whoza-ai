name: Daily KPI Reports

on:
  # Run daily at 9:00 AM GMT
  schedule:
    - cron: '0 9 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Report date (YYYY-MM-DD, leave empty for today)'
        required: false
        default: ''
      send_email:
        description: 'Send email notification'
        required: false
        type: boolean
        default: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-analytics-data pandas tabulate
      
      - name: Create reports directory
        run: |
          mkdir -p reports
          mkdir -p logs
      
      - name: Set up Google Analytics credentials
        if: ${{ secrets.GA_CREDENTIALS != '' }}
        run: |
          echo "${{ secrets.GA_CREDENTIALS }}" > /tmp/ga-credentials.json
          echo "GA_CREDENTIALS_PATH=/tmp/ga-credentials.json" >> $GITHUB_ENV
      
      - name: Generate daily report
        id: generate_report
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            REPORT_DATE="${{ github.event.inputs.report_date }}"
          else
            REPORT_DATE=$(date +%Y-%m-%d)
          fi
          
          echo "report_date=$REPORT_DATE" >> $GITHUB_OUTPUT
          
          if [ -f "/tmp/ga-credentials.json" ]; then
            python3 scripts/generate_daily_report.py --date "$REPORT_DATE" --credentials /tmp/ga-credentials.json --save-only
          else
            echo "Warning: GA credentials not configured, using mock data"
            python3 scripts/generate_daily_report.py --date "$REPORT_DATE" --save-only
          fi
          
          REPORT_FILE="reports/daily_kpi_report_${REPORT_DATE}.md"
          if [ -f "$REPORT_FILE" ]; then
            ENGAGEMENT=$(grep "Engagement" "$REPORT_FILE" | grep -oP '\d+\.\d+%' | head -1)
            TRUST=$(grep "Trust" "$REPORT_FILE" | grep -oP '\d+\.\d+%' | head -1)
            CONVERSION=$(grep "Conversion" "$REPORT_FILE" | grep -oP '\d+\.\d+%' | head -1)
            
            echo "engagement=$ENGAGEMENT" >> $GITHUB_OUTPUT
            echo "trust=$TRUST" >> $GITHUB_OUTPUT
            echo "conversion=$CONVERSION" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          
          git add reports/*.md reports/*.html
          
          REPORT_DATE="${{ steps.generate_report.outputs.report_date }}"
          ENGAGEMENT="${{ steps.generate_report.outputs.engagement }}"
          TRUST="${{ steps.generate_report.outputs.trust }}"
          CONVERSION="${{ steps.generate_report.outputs.conversion }}"
          
          COMMIT_MSG="chore: Add daily KPI report ${REPORT_DATE} - Engagement: ${ENGAGEMENT} | Trust: ${TRUST} | Conversion: ${CONVERSION}"
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
            git push
          fi
      
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-kpi-report-${{ steps.generate_report.outputs.report_date }}
          path: |
            reports/daily_kpi_report_*.md
            reports/daily_kpi_report_*_email_preview.html
          retention-days: 90
