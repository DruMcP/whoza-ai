name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create env file
        run: |
          cat > .env.local << 'EOF'
          # === SUPABASE ===
          NEXT_PUBLIC_SUPABASE_URL=https://ligjstpxqtkurvteyyhw.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpZ2pzdHB4cXRrdXJ2dGV5eWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTA4MTksImV4cCI6MjA5MzAyNjgxOX0.ep7ipBwRgh6TmjEw87xJGDXfLRBHRKh1mgDq3_eUHrI
          SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpZ2pzdHB4cXRrdXJ2dGV5eWh3Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzQ1MDgxOSwiZXhwIjoyMDkzMDI2ODE5fQ.eb1X5gKZ8pKPwYDXfX2W3S_jqLgRHRKh1mgDq3_xGr0
          # === SITE ===
          NEXT_PUBLIC_SITE_URL=https://whoza.ai
          # === STRIPE (placeholder for build — real keys set in Netlify runtime) ===
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_51ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890abcdefghijklmnop
          STRIPE_SECRET_KEY=sk_test_51ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890abcdefghijklmnop
          # === EMAIL (placeholder for build) ===
          RESEND_API_KEY=re_test_placeholder
          # === REX / AI (placeholder for build) ===
          GOOGLE_PLACES_API_KEY=AIza_test_placeholder
          PERPLEXITY_API_KEY=pplx_test_placeholder
          # === TRILLET ===
          TRILLET_BASE_URL=https://api.trillet.ai/v1
          TRILLET_WORKSPACE_ID=whoza-workspace
          TRILLET_AGENT_ID=katie-agent
          # === WHATSAPP ===
          WHATSAPP_PROVIDER=trillet
          # === GITHUB ===
          GITHUB_TOKEN=*** secrets.GITHUB_TOKEN }}
          EOF

      - name: Build site
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run build

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --site 9313ac92-d80f-4935-b4f7-61a0c5b07e2d --dir .next
        env:
          NETLIFY_AUTH_TOKEN: *** secrets.NETLIFY_AUTH_TOKEN }}
