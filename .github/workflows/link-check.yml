name: Broken Link Checker

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sundays at 03:00 UTC
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    name: Check Links
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check staging links
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --base https://whoza-ai-staging-349.netlify.app/
            --exclude "mailto:*"
            --exclude "tel:*"
            --exclude "*.pdf"
            --exclude "linkedin.com/*"
            --exclude "twitter.com/*"
            --exclude "x.com/*"
            --timeout 30
            --max-concurrency 5
            --retry 3
            --accept 200,201,204,301,302,308
            --format markdown
            --output lychee-staging.md
            .
          fail: false

      - name: Check production links
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --base https://www.whoza.ai/
            --exclude "mailto:*"
            --exclude "tel:*"
            --exclude "*.pdf"
            --exclude "linkedin.com/*"
            --exclude "twitter.com/*"
            --exclude "x.com/*"
            --timeout 30
            --max-concurrency 5
            --retry 3
            --accept 200,201,204,301,302,308
            --format markdown
            --output lychee-prod.md
            .
          fail: false

      - name: Parse results
        id: parse
        run: |
          BROKEN=0
          for file in lychee-staging.md lychee-prod.md; do
            if [ -f "$file" ]; then
              COUNT=$(grep -c "✗" "$file" || echo "0")
              BROKEN=$((BROKEN + COUNT))
            fi
          done
          echo "broken=$BROKEN" >> $GITHUB_OUTPUT

      - name: Create issue if broken links found
        if: steps.parse.outputs.broken > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            
            if (fs.existsSync('lychee-staging.md')) {
              report += '## Staging (whoza-ai-staging-349)\n\n';
              report += fs.readFileSync('lychee-staging.md', 'utf8');
            }
            
            if (fs.existsSync('lychee-prod.md')) {
              report += '\n\n## Production (whoza.ai)\n\n';
              report += fs.readFileSync('lychee-prod.md', 'utf8');
            }
            
            const title = `[AUTONOMOUS] Broken Links Detected — ${new Date().toISOString().split('T')[0]}`;
            const body = `## Broken Link Report
            
            **Time:** ${new Date().toISOString()}
            
            ### Summary
            ${report.substring(0, 6000)}...
            
            ### Action Required
            1. Review broken URLs above
            2. Fix or remove dead links
            3. Re-run link checker to verify
            
            ---
            *Auto-generated by whoza.ai monitoring system*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['autonomous', 'links', 'seo']
            });