name: Broken Link Checker

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sundays at 03:00 UTC
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    name: Check Links
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --base https://whoza-ai-staging-349.netlify.app/
            --exclude "mailto:*"
            --exclude "tel:*"
            --exclude "*.pdf"
            --timeout 30
            --max-concurrency 10
            --retry 3
            --accept 200,201,204,301,302,308
            .
          fail: false

      - name: Check production links
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --base https://www.whoza.ai/
            --exclude "mailto:*"
            --exclude "tel:*"
            --exclude "*.pdf"
            --timeout 30
            --max-concurrency 10
            --retry 3
            --accept 200,201,204,301,302,308
            .
          fail: false

      - name: Parse results
        id: parse
        run: |
          BROKEN=$(cat lychee/out.md | grep -c "✗" || echo "0")
          echo "broken=$BROKEN" >> $GITHUB_OUTPUT

      - name: Create issue if broken links found
        if: steps.parse.outputs.broken > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('lychee/out.md', 'utf8');
            
            const title = `[AUTONOMOUS] Broken Links Detected — ${new Date().toISOString().split('T')[0]}`;
            const body = `## Broken Link Report
            
            **Time:** ${new Date().toISOString()}
            
            ### Summary
            ${report.substring(0, 3000)}...
            
            ### Action Required
            1. Review broken URLs above
            2. Fix or remove dead links
            3. Re-run link checker to verify
            
            ---
            *Auto-generated by whoza.ai monitoring system*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['autonomous', 'links', 'seo']
            });