name: Security Audit

on:
  schedule:
    - cron: '0 7 * * 1'  # Weekly on Mondays at 07:00 UTC
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    name: npm Audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: audit
        run: |
          # Run audit and capture JSON regardless of exit code
          npm audit --audit-level=moderate --json > audit-results.json 2>/dev/null || true
          
          # Validate JSON exists and is parseable
          if ! jq empty audit-results.json 2>/dev/null; then
            echo "audit-results.json is not valid JSON or is empty"
            echo "critical=0" >> $GITHUB_OUTPUT
            echo "high=0" >> $GITHUB_OUTPUT
            echo "moderate=0" >> $GITHUB_OUTPUT
            echo "Vulnerabilities found: Critical=0, High=0, Moderate=0"
            exit 0
          fi
          
          # Count vulnerabilities by severity — handle null/missing .vulnerabilities
          CRITICAL=$(jq '[.vulnerabilities // {} | to_entries[] | select(.value.severity == "critical")] | length' audit-results.json)
          HIGH=$(jq '[.vulnerabilities // {} | to_entries[] | select(.value.severity == "high")] | length' audit-results.json)
          MODERATE=$(jq '[.vulnerabilities // {} | to_entries[] | select(.value.severity == "moderate")] | length' audit-results.json)
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT
          
          echo "Vulnerabilities found: Critical=$CRITICAL, High=$HIGH, Moderate=$MODERATE"

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: audit-results.json
          retention-days: 30

      - name: Create issue for critical vulnerabilities
        if: steps.audit.outputs.critical > 0
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[P2-AUTONOMOUS] Critical Security Vulnerabilities Detected`;
            const body = `## Security Audit Alert
            
            **Time:** ${new Date().toISOString()}
            **Commit:** ${{ github.sha }}
            
            ### Vulnerability Summary
            - Critical: ${{ steps.audit.outputs.critical }}
            - High: ${{ steps.audit.outputs.high }}
            - Moderate: ${{ steps.audit.outputs.moderate }}
            
            ### Action Required
            1. Review audit-results.json artifact
            2. Update affected packages
            3. Run tests to verify no regressions
            4. Deploy patch to staging first
            
            ---
            *Auto-generated by whoza.ai security monitoring*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['autonomous', 'security', 'P2']
            });

      - name: Auto-create PR for patchable vulnerabilities
        if: steps.audit.outputs.critical == 0 && steps.audit.outputs.high == 0
        run: |
          # Run fix but don't fail if vulnerabilities remain (e.g. require --force)
          npm audit fix --package-lock-only || true
          
          if git diff --quiet; then
            echo "No patchable vulnerabilities found"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            BRANCH="security/patch-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add package-lock.json
            git commit -m "chore: auto-patch moderate vulnerabilities [skip ci]"
            git push origin "$BRANCH"
            
            # Create PR via gh CLI — labels created dynamically if missing
            gh pr create \
              --title "chore: security patch $(date +%Y-%m-%d)" \
              --body "Auto-generated security patch for moderate vulnerabilities.\n\n- [ ] Review changes\n- [ ] Run tests\n- [ ] Merge if clean" \
              --label "autonomous,security" \
              --draft || \
            gh pr create \
              --title "chore: security patch $(date +%Y-%m-%d)" \
              --body "Auto-generated security patch for moderate vulnerabilities.\n\n- [ ] Review changes\n- [ ] Run tests\n- [ ] Merge if clean" \
              --draft
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail workflow on critical
        if: steps.audit.outputs.critical > 0
        run: |
          echo "❌ Critical vulnerabilities found. Workflow failing."
          exit 1