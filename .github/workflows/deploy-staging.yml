name: deploy_staging
on:
  push:
    branches: [soft-launch]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Netlify Staging
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir .next --site 97f8a30c-8ba7-4e98-aef4-cfee00eb91dd
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_STAGING_TOKEN }}