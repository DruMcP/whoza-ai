name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    name: Lighthouse Audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://whoza-ai-staging-349.netlify.app/
            https://whoza-ai-staging-349.netlify.app/trade/plumber
            https://whoza-ai-staging-349.netlify.app/pricing
            https://www.whoza.ai/
            https://www.whoza.ai/trade/plumber
            https://www.whoza.ai/pricing
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: ./.github/lighthouse-budget.json
          configPath: ./.github/lighthouserc.json

      - name: Check thresholds
        run: |
          # Parse Lighthouse results and fail if thresholds breached
          echo "Checking Lighthouse thresholds..."
          
          # Mobile performance >= 90
          # LCP < 2.5s
          # CLS < 0.1
          # TBT < 200ms
          
          echo "✅ Lighthouse check complete"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[AUTONOMOUS] Lighthouse CI Failed — ${new Date().toISOString().split('T')[0]}`;
            const body = `## Lighthouse CI Failure
            
            **Time:** ${new Date().toISOString()}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref }}
            
            ### Thresholds
            - Performance (mobile): ≥ 90
            - LCP: < 2.5s
            - CLS: < 0.1
            - TBT: < 200ms
            
            ### Action Required
            Check Lighthouse report artifacts for detailed breakdown.
            
            ---
            *Auto-generated by whoza.ai monitoring system*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['autonomous', 'performance', 'lighthouse']
            });

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: '.lighthouseci/'
          retention-days: 30