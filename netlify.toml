[build]
  command = "rm -rf dist node_modules package-lock.json && npm install && export NEXT_PUBLIC_SUPABASE_URL=\"$VITE_SUPABASE_URL\" && export NEXT_PUBLIC_SUPABASE_ANON_KEY=\"$VITE_SUPABASE_ANON_KEY\" && export NEXT_PUBLIC_SITE_URL=\"https://whoza.ai\" && export SUPABASE_SERVICE_ROLE_KEY=\"$SUPABASE_ACCESS_TOKEN\" && npm run build"
  publish = ".next"

[context.production.environment]
  # NOTE: Do NOT set NODE_ENV=production here — it causes npm to skip devDependencies
  # Build-critical packages like @tailwindcss/postcss are in devDependencies
  # NODE_ENV is set to production by Next.js build automatically

# === SEO MIGRATION: Old URLs → New Build (2026-05-14) ===
# NOTE: Removed redirects for /blog, /how-it-works, /case-studies, /trust, /contact
# These pages exist in the app and should NOT be redirected
# Also removed trailing slash normalization — handled by Next.js Netlify plugin

[[redirects]]
  from = "/terms-of-service"
  to = "/terms"
  status = 301

