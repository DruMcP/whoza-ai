[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' *.netlify.com *.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *.google-analytics.com; font-src 'self'; connect-src 'self' *.supabase.co *.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    # === TTFB OPTIMIZATION: Cache static assets at Netlify edge ===
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Link = "</llms.txt>; rel=\"llms-txt\""
    X-Llms-Txt = "/llms.txt"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Link = "</llms.txt>; rel=\"llms-txt\""
    X-Llms-Txt = "/llms.txt"

[[headers]]
  for = "/.well-known/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Link = "</llms.txt>; rel=\"llms-txt\""
    X-Llms-Txt = "/llms.txt"

# === TTFB OPTIMIZATION: Aggressive edge caching for static assets ===
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=31536000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=31536000"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=31536000"

