[build]
  command = "npm run build"
  publish = ".next"
  environment = { NODE_VERSION = "20", NODE_OPTIONS = "--max-old-space-size=4096", NEXT_TELEMETRY_DISABLED = "1" }

[[plugins]]
  package = "@netlify/plugin-nextjs"

# === SEO MIGRATION: Old URLs → New Build (2026-05-14) ===
