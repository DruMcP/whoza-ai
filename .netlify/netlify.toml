headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[build]
edge_functions = "/root/.openclaw/workspace/whoza-ai/netlify/edge-functions"
publish = "/root/.openclaw/workspace/whoza-ai/dist"
publishOrigin = "config"
commandOrigin = "config"
command = "npx vite build && node scripts/prerender.mjs"

[build.environment]
NODE_VERSION = "20"
SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDXpEGqFvcgWvUcKbSCZstbUYZSqpWL62A"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[edge_functions]]
function = "redirect-couk"
path = "/*"

[functions]

[functions."*"]

[[headers]]
for = "/*.html"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.svg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"

[headers.values]
