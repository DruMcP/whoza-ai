# Better Uptime Monitor Configuration for whoza.ai
# https://betteruptime.com/api
# 
# Setup: Set BETTERUPTIME_API_KEY in GitHub Secrets or env
# Usage: bash scripts/setup-better-uptime.sh

api_url="https://betteruptime.com/api/v2"

# ─── Monitor Definitions ───
# Each monitor checks a critical endpoint for whoza.ai

declare -A monitors

# Staging monitors
monitors[staging-homepage]="https://whoza-ai-staging-349.netlify.app/|GET|200|3000|London,Manchester,Frankfurt,New York"
monitors[staging-plumber]="https://whoza-ai-staging-349.netlify.app/trade/plumber|GET|200|3000|London,Manchester,Frankfurt"
monitors[staging-electrician]="https://whoza-ai-staging-349.netlify.app/trade/electrician|GET|200|3000|London,Manchester,Frankfurt"
monitors[staging-heating]="https://whoza-ai-staging-349.netlify.app/trade/hvac|GET|200|3000|London,Manchester,Frankfurt"
monitors[staging-pricing]="https://whoza-ai-staging-349.netlify.app/pricing|GET|200|3000|London,Manchester"

# Production monitors
monitors[prod-homepage]="https://www.whoza.ai/|GET|200|3000|London,Manchester,Frankfurt,New York"
monitors[prod-plumber]="https://www.whoza.ai/trade/plumber|GET|200|3000|London,Manchester,Frankfurt"
monitors[prod-electrician]="https://www.whoza.ai/trade/electrician|GET|200|3000|London,Manchester,Frankfurt"
monitors[prod-heating]="https://www.whoza.ai/trade/hvac|GET|200|3000|London,Manchester,Frankfurt"
monitors[prod-pricing]="https://www.whoza.ai/pricing|GET|200|3000|London,Manchester"

# Voice infrastructure monitors
monitors[trillet-webhook-health]="https://www.whoza.ai/api/health/trillet|GET|200|2000|London,Frankfurt"
monitors[trillet-webhook-receiver]="https://www.whoza.ai/api/trillet-webhook|GET|200|2000|London,Frankfurt"

# Supabase monitors
monitors[supabase-auth]="https://ligjstpxqtkurvteyyhw.supabase.co/auth/v1/health|GET|200|3000|Frankfurt,London"

# Dashboard
monitors[prod-dashboard]="https://www.whoza.ai/dashboard|GET|200|5000|London,Manchester"

# Note: Call logging API and Retell/Bland webhook receiver URLs 
# must be added after verifying actual endpoints in production
# monitors[call-logging-api]="https://www.whoza.ai/api/calls|GET|200|3000|London,Frankfurt"
# monitors[retell-webhook]="https://www.whoza.ai/api/retell-webhook|GET|200|2000|London,Frankfurt"
